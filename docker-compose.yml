services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/var/www/html:delegated
    environment:
      - PHP_MEMORY_LIMIT=4G
    networks:
      - magento-net

  nginx:
    image: nginx:1.25
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html:delegated
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - magento-net

  db:
    image: mariadb:11.4
    command: --max-allowed-packet=64M
    ports:
      - "3306:3306"
    environment:
      - MARIADB_DATABASE=petmorestore
      - MARIADB_USER=dummy_root
      - MARIADB_PASSWORD=testes
      - MARIADB_ROOT_PASSWORD=root
    networks:
      - magento-net

  opensearch:
    image: opensearchproject/opensearch:2.11.0
    environment:
      - discovery.type=single-node
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=testes
      - network.host=0.0.0.0
    ports:
      - 9200:9200
      - 9600:9600
    networks:
      - magento-net

networks:
  magento-net:
    driver: bridge